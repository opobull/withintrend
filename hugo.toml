baseURL = "https://withintrend.org/"
languageCode = "en-us"
title = "WithinTrend — Trending Topics & Guides"
theme = "PaperMod"
buildFuture = false

[services]
  [services.googleAnalytics]
    ID = "G-LYGHJGWPR2"

[params]
  description = "Trending topics, guides, and insights across tech, lifestyle, entertainment, and more."
  author = "WithinTrend"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  defaultTheme = "light"
  ShowToc = true

[params.homeInfoParams]
  Title = "Part-Time Job Reviews You Can Trust"
  Content = "Real experiences, honest pay info, and practical tips for every part-time job out there."

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 1

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 2

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
